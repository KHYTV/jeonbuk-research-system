name: weekly-pipeline

# 매주 월요일 21:00 UTC (= 화요일 06:00 KST) 자동 실행 + 수동 실행
on:
  schedule:
    - cron: "0 21 * * 1"
  workflow_dispatch:

permissions:
  contents: write   # docs/ 갱신 커밋용

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect (pipeline)
        working-directory: pipeline
        env:
          DATAGOKR_API_KEY: ${{ secrets.DATAGOKR_API_KEY }}
          KOSIS_API_KEY:    ${{ secrets.KOSIS_API_KEY }}
          TOURAPI_KEY:      ${{ secrets.TOURAPI_KEY }}
          KAKAO_REST_KEY:   ${{ secrets.KAKAO_REST_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          BIGKINDS_API_KEY: ${{ secrets.BIGKINDS_API_KEY }}
        run: python main.py weekly
        continue-on-error: true

      - name: Analyze + article + dashboard (bridge)
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bridge.py

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "chore: weekly dashboard refresh" || echo "no changes"
          git push
